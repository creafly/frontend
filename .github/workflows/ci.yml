name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '22'
  SERVICE_NAME: frontend

jobs:
  test:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: Check registry configuration
        id: check
        run: |
          if [ -n "${{ vars.REGISTRY_URL }}" ] && [ -n "${{ vars.REGISTRY_USERNAME }}" ] && [ -n "${{ secrets.REGISTRY_TOKEN }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Docker build skipped: REGISTRY_URL, REGISTRY_USERNAME, or REGISTRY_TOKEN not configured"
          fi

      - name: Checkout code
        if: steps.check.outputs.configured == 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate version
        if: steps.check.outputs.configured == 'true'
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LATEST_TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "Generated version: ${NEW_VERSION}"

      - name: Set up Docker Buildx
        if: steps.check.outputs.configured == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        if: steps.check.outputs.configured == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Extract metadata
        if: steps.check.outputs.configured == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.REGISTRY_URL }}/${{ vars.REGISTRY_REPOSITORY }}/${{ env.SERVICE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push
        if: steps.check.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Create Git Tag
        if: steps.check.outputs.configured == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Skip notice
        if: steps.check.outputs.configured == 'false'
        run: |
          echo "Docker build skipped: Registry not configured"
          echo ""
          echo "To enable Docker builds, configure the following in your repository settings:"
          echo "  Variables (Settings → Secrets and variables → Actions → Variables):"
          echo "    - REGISTRY_URL (e.g., ghcr.io, docker.io)"
          echo "    - REGISTRY_USERNAME"
          echo "    - REGISTRY_REPOSITORY"
          echo ""
          echo "  Secrets (Settings → Secrets and variables → Actions → Secrets):"
          echo "    - REGISTRY_TOKEN"
